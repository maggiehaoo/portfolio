<!DOCTYPE html>
<html>
<head>
    <title>Maggie Portfolio</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: white;
            font-family: Arial, sans-serif;
        }

        .container {
            position: relative;
            width: 600px; /* adjust later if needed */
        }

        .laptop {
            width: 100%;
            display: block;
        }

        /* TEXT ON TOP OF LAPTOP */
        .text-overlay {
    position: absolute;

    top: 50%;
    left: 50%;

    transform: translate(-50%, -50%);

    text-align: center;

    width: 70%;
}

        .title {
            font-size: 40px;
            font-weight: bold;
        }

        .subtitle {
            font-size: 25px;
            margin-top: 10px;
        }

        /* makes it feel clickable later */
        .click-area {
            margin-top: 20px;
            display: inline-block;
            padding: 8px 12px;
            border: 1px solid black;
            cursor: pointer;
            text-decoration: none;
            color: black;
        }

        .click-area:hover {
            background: black;
            color: white;
        }

        .work-link:visited {
    color: black;
}

.work-link {
    color: black;
}

.work-link {
    display: inline-block;
    margin-top: 20px;
    font-size: 16px;
    color: black;
    text-decoration: none;
    cursor: pointer;

    transition: all 0.2s ease;
}

.work-link:hover {
    transform: scale(1.05);
    text-decoration: underline;
}

    </style>
</head>

<body>

<div class="container">

    <!-- YOUR DOODLE -->
    <img class="laptop" src="images/computer-outline.png">

    <!-- TEXT ON TOP -->
    <div class="text-overlay">

        <div class="title">hi, i'm maggie!</div>

        <a class="work-link" href="projects.html">
    click here for my work
</a>

    </div>

</div>

</body>
</html>
