<!DOCTYPE html>
<html>
<head>
    <title>Projects</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: white;
        }

        /* GRID LAYOUT */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            padding: 50px;
        }

        /* MOBILE: 2 columns */
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* CARD WRAPPER */
        .card {
            position: relative;
            text-align: center;
            cursor: pointer;

            display: flex;
            flex-direction: column;
            align-items: center;

            transition: transform 0.25s ease;
        }

        /* HOVER ONLY FOR ACTIVE PROJECTS */
        .card.active:hover {
            transform: scale(1.05) rotate(1deg);
        }

        /* OUTLINE FRAME */
        .outline {
            width: 100%;
            display: block;
        }

        /* IMAGE INSIDE FRAME */
        .project-img {
            width: 60%;
            margin-top: -75%;
            z-index: 1;
        }

        /* TITLE UNDER IMAGE */
        .title {
            margin-top: -10px;
            font-size: 16px;
            color: black;
        }

        /* INACTIVE CARDS */
        .inactive {
            opacity: 0.4;
        }

        /* REMOVE ALL LINK STYLING (IMPORTANT) */
        a {
            text-decoration: none;
            color: black;
        }

        a:visited {
            color: black;
        }

        a:hover {
            color: black;
        }

    </style>
</head>

<body>

<div class="grid">

    <!-- CARD 1 -->
    <a href="girls.html" class="card active">
        <img class="outline" src="images/credential-outline.png">
        <img class="project-img" src="images/placeholder.png">
        <div class="title">Girls at the Games</div>
    </a>

    <!-- CARD 2 -->
    <a href="rivermen.html" class="card active">
        <img class="outline" src="images/credential-outline.png">
        <img class="project-img" src="images/placeholder.png">
        <div class="title">Langley Rivermen</div>
    </a>

    <!-- CARD 3 -->
    <a href="rose.html" class="card active">
        <img class="outline" src="images/credential-outline.png">
        <img class="project-img" src="images/placeholder.png">
        <div class="title">Rose Tinted Ceilings</div>
    </a>

    <!-- CARD 4 -->
    <div class="card inactive">
        <img class="outline" src="images/credential-outline.png">
        <img class="project-img" src="images/placeholder.png">
        <div class="title">To be added</div>
    </div>

    <!-- CARD 5 -->
    <div class="card inactive">
        <img class="outline" src="images/credential-outline.png">
        <img class="project-img" src="images/placeholder.png">
        <div class="title">To be added</div>
    </div>

    <!-- CARD 6 -->
    <div class="card inactive">
        <img class="outline" src="images/credential-outline.png">
        <img class="project-img" src="images/placeholder.png">
        <div class="title">To be added</div>
    </div>

</div>

</body>
</html>
