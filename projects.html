<!DOCTYPE html>
<html>
<head>
    <title>Projects</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: white;
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            padding: 50px;
        }

        /* MOBILE: 2 columns (gives 3 rows) */
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 20px;
                padding: 20px;
            }
        }

        /* CARD */
        .card {
            position: relative;
            cursor: pointer;

            display: flex;
            flex-direction: column;
            align-items: center;

            text-align: center;

            transition: transform 0.25s ease;
        }

        /* HOVER ONLY FOR ACTIVE PROJECTS */
        .card.active:hover {
            transform: scale(1.05) rotate(1deg);
        }

        /* OUTLINE (credential frame) */
        .outline {
            width: 100%;
            display: block;
        }

        /* IMAGE INSIDE FRAME */
        .project-img {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);

            width: 60%;
            z-index: 2;
        }

        /* TITLE UNDER IMAGE */
        .title {
            margin-top: 10px;
            font-size: 16px;
            color: black;
        }

        /* INACTIVE CARDS */
        .inactive {
            opacity: 0.4;
        }

        /* REMOVE LINK STYLING COMPLETELY */
        a {
            text-decoration: none;
            color: black;
        }

        a:visited {
            color: black;
        }

        a:hover {
            color: black;
        }

        /* MOBILE TEXT ADJUSTMENT */
        @media (max-width: 768px) {
            .title {
                font-size: 14px;
            }

            .project-img {
                width: 65%;
            }
        }

    </style>
</head>

<body>

<div class="grid">

    <!-- CARD 1 -->
    <a href="girls.html" class="card active">
        <img class="outline" src="images/credential-outline.png">
        <img class="project-img" src="images/placeholder.png">
        <div class="title">Girls at the Games</div>
    </a>

    <!-- CARD 2 -->
    <a href="rivermen.html" class="card active">
        <img class="outline" src="images/credential-outline.png">
        <img class="project-img" src="images/placeholder.png">
        <div class="title">Langley Rivermen</div>
    </a>

    <!-- CARD 3 -->
    <a href="rose.html" class="card active">
        <img class="outline" src="images/credential-outline.png">
        <img class="project-img" src="images/placeholder.png">
        <div class="title">Rose Tinted Ceilings</div>
    </a>

    <!-- CARD 4 -->
    <div class="card inactive">
        <img class="outline" src="images/credential-outline.png">
        <img class="project-img" src="images/placeholder.png">
        <div class="title">To be added</div>
    </div>

    <!-- CARD 5 -->
    <div class="card inactive">
        <img class="outline" src="images/credential-outline.png">
        <img class="project-img" src="images/placeholder.png">
        <div class="title">To be added</div>
    </div>

    <!-- CARD 6 -->
    <div class="card inactive">
        <img class="outline" src="images/credential-outline.png">
        <img class="project-img" src="images/placeholder.png">
        <div class="title">To be added</div>
    </div>

</div>

</body>
</html>
