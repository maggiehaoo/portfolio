<!DOCTYPE html>
<html>
<head>
    <title>Projects</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: white;
        }

        /* GRID LAYOUT */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            padding: 50px;
        }

        /* MOBILE: 2 columns (gives 3 rows) */
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 20px;
                padding: 20px;
            }
        }

        /* CARD CONTAINER */
        .card {
    display: flex;
    flex-direction: column;
    align-items: center;

    text-align: center;
    cursor: pointer;

    transition: transform 0.25s ease;
}

        /* HOVER EFFECT (ONLY ACTIVE CARDS) */
        .card.active:hover {
            transform: scale(1.05) rotate(1deg);
        }

        /* OUTLINE FRAME (YOUR DOODLE PNG) */
        .outline {
            width: 100%;
            display: block;
            z-index: 1;
        }

        /* PERFECT SQUARE IMAGE CONTAINER */
       .img-box {
    width: 40%;
    aspect-ratio: 1 / 1;
    overflow: hidden;
}

        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* TITLE TEXT */
        .title {
            margin-top: 10px;
            font-size: 16px;
            color: black;
            position: relative;
            z-index: 3;
        }

        /* INACTIVE CARDS */
        .inactive {
            opacity: 0.4;
        }

        /* REMOVE LINK STYLING COMPLETELY */
        a {
            text-decoration: none;
            color: black;
        }

        a:visited {
            color: black;
        }

        a:hover {
            color: black;
        }
.title {
    margin-top: 8px;
    font-size: 16px;
    color: black;
}
    </style>
</head>

<body>

<div class="grid">

    <!-- CARD 1 -->
    <a href="girls.html" class="card active">
        <img class="outline" src="images/credential-outline.png">
        <div class="img-box">
            <img src="images/placeholder.png">
        </div>
        <div class="title">Girls at the Games</div>
    </a>

    <!-- CARD 2 -->
    <a href="rivermen.html" class="card active">
        <img class="outline" src="images/credential-outline.png">
        <div class="img-box">
            <img src="images/placeholder.png">
        </div>
        <div class="title">Langley Rivermen</div>
    </a>

    <!-- CARD 3 -->
    <a href="rose.html" class="card active">
        <img class="outline" src="images/credential-outline.png">
        <div class="img-box">
            <img src="images/placeholder.png">
        </div>
        <div class="title">Rose Tinted Ceilings</div>
    </a>

    <!-- CARD 4 -->
    <div class="card inactive">
        <img class="outline" src="images/credential-outline.png">
        <div class="img-box">
            <img src="images/placeholder.png">
        </div>
        <div class="title">To be added</div>
    </div>

    <!-- CARD 5 -->
    <div class="card inactive">
        <img class="outline" src="images/credential-outline.png">
        <div class="img-box">
            <img src="images/placeholder.png">
        </div>
        <div class="title">To be added</div>
    </div>

    <!-- CARD 6 -->
    <div class="card inactive">
        <img class="outline" src="images/credential-outline.png">
        <div class="img-box">
            <img src="images/placeholder.png">
        </div>
        <div class="title">To be added</div>
    </div>

</div>

</body>
</html>
